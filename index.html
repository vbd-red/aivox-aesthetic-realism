          url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='neural' x='0' y='0' width='120' height='120' patternUnits='userSpaceOnUse'%3E%3Cpath d='M10 10L60 60M60 60L110 10M60 60L60 110' stroke='%23FFFFFF' stroke-opacity='0.12' stroke-width='1'/%3E%3Ccircle cx='60' cy='60' r='2' fill='%23FFFFFF' fill-opacity='0.2'/%3E%3Ccircle cx='10' cy='10' r='1.5' fill='%23FFFFFF' fill-opacity='0.15'/%3E%3Ccircle cx='110' cy='10' r='1.5' fill='%23FFFFFF' fill-opacity='0.15'/%3E%3Ccircle cx='60' cy='110' r='1.5' fill='%23FFFFFF' fill-opacity='0.15'/%3E%3C/pattern%3E%3C/defs%3E%3Crect width='100%25' height='100%25' fill='url(%23neural)'/%3E%3C/svg%3E"),

          linear-gradient(135deg, #FF1E1E, #FFB800);
        
        background-attachment: fixed, fixed, fixed;
        background-position: 0 0, center top, center center;
        background-size: 120px 120px, 100% 100%, 100% 100%;
        
        min-height: 100vh;
        color: #1F2937;
      }
